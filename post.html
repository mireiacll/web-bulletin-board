<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Detail</title>
    <link rel="stylesheet" href="css/style.css">

</head>
<body>
    <button id="backToListBtn">← Back to Posts</button>
    <h1 id="postTitle"></h1>
    <p id="postAuthor"></p>
    <p id="postBody"></p>
    <button id="editPostBtn">Edit Post</button>
    <button id="deletePostBtn">Delete Post</button>
    <hr>
    <h2>Comments</h2>
    <ul id="commentList"></ul>

    <h3>Add Comment</h3>
    <input id="commentName" type="text" placeholder="Comment title">
    <br></br>
    <textarea id="commentBody" placeholder="Write your comment"></textarea>
    <br></br>
    <button id="submitCommentBtn">Submit</button>

    <script src="js/api.js"></script>
    <script src="js/post.js"></script>
    
</body>
</html>
